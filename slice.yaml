schema_version: "1.0"

# ── Identity ──────────────────────────────────────────────────────────────────
id: "slice-thmx"
name: "Thermocouple Multiplexer"
status: "concept"
category: "sensing"

summary: "Multi-channel thermocouple reader with LTC2983 universal temperature sensor IC."
description: null

# ── Versioning ────────────────────────────────────────────────────────────────
version:
  hardware: "0.1.0"
  firmware: null
  manifest: "0.1.0"

# ── Compatibility ─────────────────────────────────────────────────────────────
compatibility:
  slice_spec: ">=0.1.0 <0.2.0"
  crumbs_protocol: null
  anolis_provider_api: null

# ── Hardware ──────────────────────────────────────────────────────────────────
hardware:
  mcu:
    type: "dev-board-socket"
    form_factor: "nano"
    primary: "ATmega328P"
    supported:
      - "ATmega328P"
  primary_ic:
    manufacturer: "Analog Devices"
    part_number: "LTC2983"
  hw_gen_current: 1
  hw_gen_supported: [1]
  pcb:
    layers: 2
    thickness: "1.6mm"
    copper_weight: "1oz"
    dimensions: "70mm x 100mm"
  connectors:
    - ref: "J1"
      type: "slice-bus-10pin"
      purpose: "power-and-i2c"
  mounting:
    pattern: "slice-standard-v0"
    hole_size: "M3"
    inset: "5mm"
  pcb_color_prototype: null
  pcb_color_production: null
  enclosure:
    supported: false
    path: null

# ── Electrical ────────────────────────────────────────────────────────────────
electrical:
  input_voltage: "12V"
  logic_voltage: "5V"
  max_current: null
  protection: null
  isolation: null

# ── Interfaces ────────────────────────────────────────────────────────────────
interfaces:
  host:
    type: "i2c"
    address_default: null
    address_configurable: false
  data:
    inputs:
      - name: "TC1"
        type: "thermocouple"
      - name: "TC2"
        type: "thermocouple"
    outputs: []

# ── Capabilities ──────────────────────────────────────────────────────────────
capabilities:
  - id: "thermocouple_measurement"
    channels: 2
    control_modes: []

# ── Firmware ──────────────────────────────────────────────────────────────────
firmware: null

# ── Protocol ──────────────────────────────────────────────────────────────────
protocol: null

# ── Software ──────────────────────────────────────────────────────────────────
software: null

# ── Artifacts ─────────────────────────────────────────────────────────────────
artifacts:
  schematic: "hardware/BREAD_Slice.kicad_sch"
  pcb: "hardware/BREAD_Slice.kicad_pcb"
  firmware: null
  docs: null
  bom: "documentation/BOM_TEMP.ods"
  gerbers: null
  pick_and_place: null
  datasheets:
    - "documentation/2983fc.pdf"

# ── Manufacturing ─────────────────────────────────────────────────────────────
manufacturing: null

# ── Validation ────────────────────────────────────────────────────────────────
validation: null

# ── Safety ────────────────────────────────────────────────────────────────────
safety: null

# ── Dependencies ──────────────────────────────────────────────────────────────
dependencies: null

